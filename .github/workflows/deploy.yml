name: Deploy to Vercel

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: team_emFEjso4w4GpBnHXldl4bWMm
  VERCEL_BACKEND_PROJECT_ID: prj_kuuRyUPyElTAEN7xjj0aC8zrbJ7e
  VERCEL_FRONTEND_PROJECT_ID: prj_ASGlwTyyBu8eADafetUURi6JIK1B

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Link project
        run: |
          mkdir -p backend/.vercel
          echo "{\"projectId\":\"$VERCEL_BACKEND_PROJECT_ID\",\"orgId\":\"$VERCEL_ORG_ID\"}" > backend/.vercel/project.json
      - name: Deploy
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd=backend
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd=backend
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd=backend

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Link project
        run: |
          mkdir -p web/.vercel
          echo "{\"projectId\":\"$VERCEL_FRONTEND_PROJECT_ID\",\"orgId\":\"$VERCEL_ORG_ID\"}" > web/.vercel/project.json
      - name: Deploy
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd=web
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd=web
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd=web
