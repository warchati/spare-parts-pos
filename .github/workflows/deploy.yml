name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Backend
        run: |
          curl -s -X POST "https://api.vercel.com/v13/deployments?teamId=${{ secrets.VERCEL_TEAM_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"backend","project":"prj_kuuRyUPyElTAEN7xjj0aC8zrbJ7e","target":"production","gitSource":{"type":"github","repoId":${{ secrets.REPO_ID }},"ref":"main"}}'

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Frontend
        run: |
          curl -s -X POST "https://api.vercel.com/v13/deployments?teamId=${{ secrets.VERCEL_TEAM_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"spare-parts-pos-web","project":"prj_ASGlwTyyBu8eADafetUURi6JIK1B","target":"production","gitSource":{"type":"github","repoId":${{ secrets.REPO_ID }},"ref":"main"}}'
